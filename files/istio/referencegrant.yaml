# Allow otel-demo namespace routes to reference services in istio-system
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-otel-demo-cross-namespace
  namespace: istio-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: otel-demo
    - group: gateway.networking.k8s.io
      kind: GRPCRoute
      namespace: otel-demo
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      namespace: otel-demo
  to:
    - group: ""
      kind: Service